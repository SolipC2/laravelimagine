# Portainer stack: laravelimagine
# Grok Imagine image (laravel/ai) + video (app XaiVideoClient)
# Traefik Host: laravelimagine.solipc2.com

services:
  app:
    image: home-app:13
    container_name: laravelimagine-app
    restart: unless-stopped
    entrypoint: ["php-fpm"]
    working_dir: /var/www/html
    volumes:
      - /home/seetwo/docker/stacks/laravelimagine:/var/www/html
    environment:
      APP_NAME: Laravel Imagine
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: https://laravelimagine.solipc2.com
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: public
      IMAGINE_FAKE: ${IMAGINE_FAKE:-true}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_VIDEO_MODEL: grok-imagine-video
    networks:
      - laravelimagine
      - proxy-net

  web:
    image: nginx:1.27-alpine
    container_name: laravelimagine-web
    restart: unless-stopped
    volumes:
      - /home/seetwo/docker/stacks/laravelimagine:/var/www/html:ro
      - /home/seetwo/docker/stacks/laravelimagine/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravelimagine
      - proxy-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-net
      - traefik.http.routers.laravelimagine.rule=Host(`laravelimagine.solipc2.com`)
      - traefik.http.routers.laravelimagine.entrypoints=web
      - traefik.http.routers.laravelimagine.service=laravelimagine
      - traefik.http.services.laravelimagine.loadbalancer.server.port=80
      - traefik.http.routers.laravelimagine.priority=20

networks:
  laravelimagine:
    name: laravelimagine
    driver: bridge
  proxy-net:
    name: proxy-net
    external: true
